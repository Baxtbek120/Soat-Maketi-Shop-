<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart IT School — LMS Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--or:#FF5722;--or2:#FF7043;--orl:#FFF3F0;--bl:#2196F3;--gr:#4CAF50;--yl:#FFC107;--rd:#F44336;--pu:#9C27B0;--cy:#00BCD4;--bg:#F5F6FA;--wh:#FFFFFF;--tx:#1A1D23;--mu:#8892A4;--br:#E8ECF4;--sh:0 2px 12px rgba(0,0,0,.08);--shl:0 8px 32px rgba(0,0,0,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
/* LOGIN */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff5f2,#fff,#f0f4ff)}
.lc{background:var(--wh);border-radius:20px;padding:40px 36px;width:380px;box-shadow:var(--shl)}
.ll{text-align:center;margin-bottom:28px}
.ll-icon{width:56px;height:56px;border-radius:14px;background:var(--or);display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:10px}
.ll h2{font-size:22px;font-weight:800}.ll h2 span{color:var(--or)}
.ll p{font-size:13px;color:var(--mu);margin-top:4px}
.fg{margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;color:var(--mu);display:block;margin-bottom:6px;letter-spacing:.5px}
.pw{display:flex}
.csel{padding:11px 10px;border:1.5px solid var(--br);border-right:none;border-radius:10px 0 0 10px;font-size:13px;background:var(--bg);cursor:pointer;color:var(--tx);outline:none}
.fi{width:100%;padding:12px 14px;border:1.5px solid var(--br);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;background:var(--wh);color:var(--tx)}
.pw .fi{border-radius:0 10px 10px 0}
.fi:focus{border-color:var(--or)}
.pwr{position:relative}.pwr .fi{padding-right:44px}
.eyb{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--mu);font-size:16px}
.lbtn{width:100%;padding:14px;background:var(--or);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:8px;transition:background .2s,transform .1s}
.lbtn:hover{background:var(--or2)}.lbtn:active{transform:scale(.98)}
.lerr{background:#FFF0EE;border:1px solid #FFCDD2;color:#C62828;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
.quick-logins{margin-top:16px;border-top:1px solid var(--br);padding-top:16px}
.ql-title{font-size:11px;color:var(--mu);font-weight:700;letter-spacing:1px;margin-bottom:8px}
.ql-btns{display:flex;flex-wrap:wrap;gap:6px}
.ql-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--br);background:none;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;color:var(--tx)}
.ql-btn:hover{border-color:var(--or);color:var(--or)}
/* APP */
#appPage{display:none;min-height:100vh}
.al{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:250px;background:var(--wh);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .2s}
.sb.collapsed{width:60px}
.sbl{padding:16px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:10px}
.sbl-icon{width:36px;height:36px;background:var(--or);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.sbl-name{font-size:14px;font-weight:800;white-space:nowrap}.sbl-name span{color:var(--or)}
.sbl-sub{font-size:10px;color:var(--mu)}
.uib{margin:10px;padding:12px;background:var(--orl);border-radius:12px}
.uib-role{font-size:10px;color:var(--or);font-weight:700;letter-spacing:1px}
.uib-name{font-size:13px;font-weight:700;margin-top:2px}
.uib-phone{font-size:11px;color:var(--mu);margin-top:1px}
.ns{padding:8px 0}
.nl{font-size:10px;color:var(--mu);font-weight:700;letter-spacing:1.5px;padding:6px 16px 4px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--mu);transition:all .15s;border-left:3px solid transparent}
.ni:hover{background:var(--bg);color:var(--tx)}
.ni.active{background:var(--orl);color:var(--or);border-left-color:var(--or);font-weight:600}
.ni .nic{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.ni .nib{margin-left:auto;background:var(--or);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
.sbb{margin-top:auto;padding:12px;border-top:1px solid var(--br)}
.lgbtn{width:100%;padding:10px;background:none;border:1px solid var(--br);border-radius:8px;color:var(--mu);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.lgbtn:hover{border-color:var(--rd);color:var(--rd);background:#FFF5F5}
/* MAIN */
.mc{flex:1;overflow-y:auto;background:var(--bg)}
.tb{background:var(--wh);border-bottom:1px solid var(--br);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.tb-title{font-size:18px;font-weight:800;flex:1}
.tb-actions{display:flex;align-items:center;gap:10px}
.sync-pill{font-size:11px;font-weight:700;padding:6px 10px;border-radius:999px;background:#FFF3E0;color:#E65100;border:1px solid #FFE0B2}
.sync-pill.ok{background:#E8F5E9;color:#2E7D32;border-color:#C8E6C9}
.sync-pill.err{background:#FFEBEE;color:#C62828;border-color:#FFCDD2}
.nb{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:16px;position:relative}
.nd{width:8px;height:8px;background:var(--rd);border-radius:50%;position:absolute;top:4px;right:4px;border:2px solid var(--wh)}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--or2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;cursor:pointer}
/* PAGES */
.page{display:none;padding:24px}
.page.active{display:block}
/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.sc{background:var(--wh);border-radius:14px;padding:20px;box-shadow:var(--sh);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;right:-10px;top:-10px;width:70px;height:70px;border-radius:50%;opacity:.08}
.sc.or::before{background:var(--or)}.sc.bl::before{background:var(--bl)}.sc.gr::before{background:var(--gr)}.sc.pu::before{background:var(--pu)}
.sc-ic{font-size:28px;margin-bottom:8px}.sc-val{font-size:28px;font-weight:800}.sc-lbl{font-size:12px;color:var(--mu);margin-top:2px}
.sc-tr{font-size:11px;margin-top:6px}.sc-tr.up{color:var(--gr)}.sc-tr.dn{color:var(--rd)}
/* TABLE */
.tc{background:var(--wh);border-radius:14px;box-shadow:var(--sh);overflow:hidden;margin-bottom:20px}
.th2{padding:16px 20px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.th2 h3{font-size:15px;font-weight:700;flex:1}
.si{padding:8px 14px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;width:200px}
.si:focus{border-color:var(--or)}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.5px;background:var(--bg);border-bottom:1px solid var(--br)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--br);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFD}
/* BADGES */
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:#E8F5E9;color:#2E7D32}.bo{background:#FFF3E0;color:#E65100}.bb{background:#E3F2FD;color:#1565C0}.br2{background:#FFEBEE;color:#C62828}.bp{background:#F3E5F5;color:#6A1B9A}.bgr{background:#F5F5F5;color:#757575}.by{background:#FFFDE7;color:#F57F17}
/* BUTTONS */
.abt{padding:5px 12px;border-radius:6px;border:1.5px solid var(--br);background:none;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-right:4px}
.abt:hover{border-color:var(--or);color:var(--or)}
.abt.dn:hover{border-color:var(--rd);color:var(--rd)}
.addb{padding:8px 16px;background:var(--or);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s}
.addb:hover{opacity:.88}
.addb.bl{background:var(--bl)}.addb.gr{background:var(--gr)}.addb.pu{background:var(--pu)}
/* COIN */
.cb2{display:inline-flex;align-items:center;gap:4px;background:#FFF8E1;color:#F57F17;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:999}
.mo.open{display:flex}
.mod{background:var(--wh);border-radius:16px;padding:28px;width:520px;max-width:95vw;box-shadow:var(--shl);max-height:85vh;overflow-y:auto}
.mod-title{font-size:17px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.mcl{margin-left:auto;background:none;border:none;font-size:22px;cursor:pointer;color:var(--mu);line-height:1}
.mod .fg{margin-bottom:14px}
.mda{display:flex;gap:10px;margin-top:20px}
.mda .bp2{flex:1;padding:12px;background:var(--or);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;transition:opacity .2s}
.mda .bp2:hover{opacity:.88}
.mda .bg2{padding:12px 20px;background:none;border:1.5px solid var(--br);border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;color:var(--mu)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--tx);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:9999;display:none;box-shadow:var(--shl);animation:su .3s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
/* PROGRESS */
.pb{height:8px;background:var(--br);border-radius:4px;overflow:hidden}
.pf{height:100%;background:var(--or);border-radius:4px}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
/* INFO CARD */
.ic{background:var(--wh);border-radius:14px;padding:20px;box-shadow:var(--sh);margin-bottom:16px}
.ir{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--br);font-size:14px}
.ir:last-child{border-bottom:none}
.ir .il{color:var(--mu);width:150px;flex-shrink:0;font-size:13px}
.ir .iv{font-weight:500}
/* SECTION TITLE */
.st{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
/* TASK ITEM */
.tsi{background:var(--wh);border-radius:12px;padding:16px 20px;border:1px solid var(--br);margin-bottom:10px;display:flex;align-items:center;gap:14px}
.tsi-icon{font-size:24px}.tsi-body{flex:1}.tsi-title{font-size:14px;font-weight:600}.tsi-meta{font-size:12px;color:var(--mu);margin-top:2px}
.tsi-acts{display:flex;gap:8px;align-items:center}
/* PAY CARD */
.pc{background:linear-gradient(135deg,var(--or),#FF8C00);border-radius:14px;padding:20px;color:#fff;margin-bottom:16px}
.pc .pc-lbl{font-size:12px;opacity:.8}.pc .pc-val{font-size:32px;font-weight:800;margin:4px 0}
/* HERO */
.hero{background:linear-gradient(120deg,#1e293b,#0f172a 55%,#111827);color:#fff;border-radius:16px;padding:20px 22px;box-shadow:var(--shl);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hero h3{font-size:20px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;opacity:.85}
.hero .hero-actions{display:flex;gap:8px;flex-wrap:wrap}
.hero .hero-btn{padding:9px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.hero .hero-btn:hover{background:rgba(255,255,255,.15)}
/* CHAT */
.cha{display:flex;flex-direction:column;height:calc(100vh - 120px)}
.chm{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:12px}
.cm{display:flex;gap:10px;max-width:650px}
.cm.me{flex-direction:row-reverse;align-self:flex-end}
.cav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.cbbl{padding:11px 15px;border-radius:12px;font-size:14px;line-height:1.6;max-width:450px}
.cm.other .cbbl{background:var(--wh);border:1px solid var(--br);border-radius:4px 12px 12px 12px}
.cm.me .cbbl{background:var(--or);color:#fff;border-radius:12px 4px 12px 12px}
.cir{display:flex;gap:10px;padding:14px;background:var(--wh);border-radius:14px;border:1px solid var(--br);margin-top:12px}
.cir input{flex:1;border:none;outline:none;font-size:14px;font-family:'Inter',sans-serif;color:var(--tx);background:transparent}
.cs{width:38px;height:38px;background:var(--or);border:none;border-radius:10px;cursor:pointer;font-size:16px;color:#fff;transition:opacity .2s}
.cs:hover{opacity:.85}
/* QUIZ */
.qc{max-width:700px}
.qhd{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.qn{font-family:monospace;font-size:12px;color:var(--mu)}
.qpb{flex:1;height:8px;background:var(--br);border-radius:4px;overflow:hidden}
.qpf{height:100%;background:var(--or);border-radius:4px;transition:width .3s}
.qs{font-family:monospace;font-size:13px;color:var(--or)}
.qq{font-size:18px;font-weight:700;margin-bottom:16px;line-height:1.5}
.qcode{background:#1e1e2e;color:#a6e3a1;border-radius:10px;padding:16px;font-family:monospace;font-size:13px;line-height:1.7;margin-bottom:18px;white-space:pre-wrap}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.opt{padding:13px 16px;border-radius:10px;border:1.5px solid var(--br);cursor:pointer;font-size:14px;transition:all .15s;background:var(--wh)}
.opt:hover{border-color:var(--or);color:var(--or)}
.opt.ok{border-color:var(--gr);background:#E8F5E9;color:#2E7D32}
.opt.ng{border-color:var(--rd);background:#FFEBEE;color:#C62828}
.opt.sel{border-color:var(--or);background:var(--orl)}
.fbx{padding:13px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;display:none}
.fbx.ok{background:#E8F5E9;border:1px solid #A5D6A7;color:#2E7D32}
.fbx.ng{background:#FFEBEE;border:1px solid #EF9A9A;color:#C62828}
/* LESSON BUILDER */
.lb-card{background:var(--wh);border-radius:12px;padding:20px;border:1px solid var(--br);margin-bottom:12px}
.lb-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.lb-num{width:32px;height:32px;border-radius:50%;background:var(--or);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.lb-title{font-size:15px;font-weight:700;flex:1}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mu);transition:all .15s;border:none;background:none;font-family:'Inter',sans-serif}
.tab.active{background:var(--wh);color:var(--tx);box-shadow:var(--sh)}
/* STAR RATING */
.stars{display:flex;gap:4px;font-size:20px;cursor:pointer}
.star{color:var(--br);transition:color .15s}.star.on{color:var(--yl)}
/* VIDEO CARD */
.vc{background:var(--wh);border-radius:12px;overflow:hidden;border:1px solid var(--br);cursor:pointer;transition:transform .2s,box-shadow .2s}
.vc:hover{transform:translateY(-3px);box-shadow:var(--shl)}
.vthumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.vpill{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:2px 8px;border-radius:4px}
.vbody{padding:14px}
.vtitle{font-size:14px;font-weight:700;margin-bottom:4px}
.vmeta{font-size:12px;color:var(--mu)}
/* NOTIF */
.nf-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--br);align-items:flex-start}
.nf-item:last-child{border-bottom:none}
.nf-ic{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nf-body{flex:1}.nf-title{font-size:14px;font-weight:600}.nf-time{font-size:11px;color:var(--mu);margin-top:2px}
.nf-dot{width:8px;height:8px;border-radius:50%;background:var(--or);margin-top:6px;flex-shrink:0}
/* EMOJI PICKER */
.ep{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ep span{font-size:22px;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s}
.ep span:hover{background:var(--bg)}
/* ENTERPRISE PANELS */
.ekpi{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.ekpi .k{background:var(--wh);border:1px solid var(--br);border-radius:12px;padding:14px}
.ekpi .k .n{font-size:11px;color:var(--mu);margin-bottom:4px}
.ekpi .k .v{font-size:24px;font-weight:800}
.ekpi .k .t{font-size:11px;margin-top:6px}
.crm-board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.crm-col{background:var(--wh);border:1px solid var(--br);border-radius:12px;min-height:260px;padding:10px}
.crm-col h4{font-size:13px;margin-bottom:10px}
.crm-card{background:#fff;border:1px solid var(--br);border-radius:10px;padding:10px;margin-bottom:8px}
.crm-card .ttl{font-size:13px;font-weight:700}
.crm-card .meta{font-size:11px;color:var(--mu);margin-top:4px}
.crm-card .sum{font-size:12px;color:var(--or);font-weight:700;margin-top:6px}
.xgrid{display:grid;grid-template-columns:1.2fr 1fr;gap:14px}
.xcard{background:var(--wh);border:1px solid var(--br);border-radius:12px;padding:16px}
.xrow{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px dashed var(--br)}
.xrow:last-child{border-bottom:none}
.xname{font-size:13px}
.xval{font-size:13px;font-weight:700}
.lb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.lb-item{background:var(--wh);border:1px solid var(--br);border-radius:12px;padding:14px}
.lb-item .cat{font-size:11px;color:var(--mu)}
.lb-item .name{font-size:14px;font-weight:700;margin-top:4px}
.lb-item .desc{font-size:12px;color:var(--mu);margin-top:6px;line-height:1.5}
.lb-item .act{margin-top:10px;display:flex;gap:8px}
.rm-tl{position:relative;padding-left:18px}
.rm-tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--br)}
.rm-phase{position:relative;background:var(--wh);border:1px solid var(--br);border-radius:12px;padding:14px;margin-bottom:12px}
.rm-phase::before{content:'';position:absolute;left:-17px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--or)}
.rm-phase h4{font-size:14px}
.rm-phase p{font-size:12px;color:var(--mu);margin-top:5px;line-height:1.5}
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.set-card{background:var(--wh);border:1px solid var(--br);border-radius:12px;padding:14px}
.set-card h4{font-size:14px;margin-bottom:10px}
.set-opt{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--br);font-size:13px}
.set-opt:last-child{border-bottom:none}
.chip{display:inline-flex;align-items:center;padding:4px 9px;border:1px solid var(--br);border-radius:999px;font-size:11px;background:#fff}

function setSyncStatus(txt,type){
  const badge=document.getElementById('syncStatus');
  if(!badge)return;
  badge.textContent=txt;
  badge.className='sync-pill'+(type?' '+type:'');
}

function collectState(){
  return {USERS,students,courses,lessons,tasks,quizzes,payments,certificates,chatMsgs,announcements};
}

function applyState(data){
  if(!data||typeof data!=='object')return;
  if(data.USERS&&typeof data.USERS==='object')USERS=data.USERS;
  if(Array.isArray(data.students))students=data.students;
  if(Array.isArray(data.courses))courses=data.courses;
  if(data.lessons&&typeof data.lessons==='object')lessons=data.lessons;
  if(Array.isArray(data.tasks))tasks=data.tasks;
  if(Array.isArray(data.quizzes))quizzes=data.quizzes;
  if(Array.isArray(data.payments))payments=data.payments;
  if(Array.isArray(data.certificates))certificates=data.certificates;
  if(Array.isArray(data.chatMsgs))chatMsgs=data.chatMsgs;
  if(Array.isArray(data.announcements))announcements=data.announcements;
}

async function loadInitialState(){
  setSyncStatus('LOADING...','');
  try{
    const res=await fetch(`${API_BASE}/state`);
    if(!res.ok)throw new Error('Server load failed');
    const payload=await res.json();
    if(payload&&payload.state)applyState(payload.state);
    localStorage.setItem(LOCAL_FALLBACK_KEY,JSON.stringify(collectState()));
    setSyncStatus('SERVER ON','ok');
    return;
  }catch(e){
    const raw=localStorage.getItem(LOCAL_FALLBACK_KEY);
    if(raw){
      try{applyState(JSON.parse(raw));}catch(_){}
      setSyncStatus('LOCAL MODE','');
      return;
    }
    setSyncStatus('OFFLINE','err');
  }
}

async function pushStateToServer(force=false){
  const state=collectState();
  const hash=JSON.stringify(state);
  if(!force&&hash===lastStateHash)return;
  lastStateHash=hash;
  localStorage.setItem(LOCAL_FALLBACK_KEY,hash);
  try{
    const res=await fetch(`${API_BASE}/state`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({state}),
    });
    if(!res.ok)throw new Error('save failed');
    setSyncStatus('SYNCED','ok');
  }catch(e){
    setSyncStatus('LOCAL MODE','');
  }
}

function startStateSync(){
  if(stateSyncTimer)clearInterval(stateSyncTimer);
  stateSyncTimer=setInterval(()=>{pushStateToServer(false)},4000);
}

function buildNav(){
  const items=getNavDef();
  const wrap=document.getElementById('navItems');
  wrap.innerHTML='';
  const sections=[];
  const grouped={};
  items.forEach(item=>{
    const section=item.section||'Asosiy';
    if(!grouped[section]){grouped[section]=[];sections.push(section);}
    grouped[section].push(item);
  });
  sections.forEach(section=>{
    const header=document.createElement('div');
    header.className='nav-section';
    header.innerHTML=`<span>${section}</span><span class="sect-arrow">▼</span>`;
    const list=document.createElement('div');
    list.className='nav-group';
    grouped[section].forEach(item=>{
      const d=document.createElement('div');
      d.className='ni';d.id='nav-'+item.id;
      d.innerHTML=`<span class="nic">${item.icon}</span>${item.label}`;
      d.onclick=()=>showPage(item.id,item.label);
      list.appendChild(d);
    });
    header.addEventListener('click',()=>{
      const collapsed=list.classList.toggle('collapsed');
      header.querySelector('.sect-arrow').textContent=collapsed?'▶':'▼';
    });
    wrap.appendChild(header);
    wrap.appendChild(list);
  });
}

function showPage(id,label){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  let pg=document.getElementById('pg-'+id);
  if(!pg){
    pg=document.createElement('div');
    pg.className='page';
    pg.id='pg-'+id;
    document.getElementById('pw').appendChild(pg);
  }
  pg.classList.add('active');
  pg.innerHTML=renderPage(id);
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  const ni=document.getElementById('nav-'+id);
  if(ni)ni.classList.add('active');
  document.getElementById('tbt').textContent=label||id;
  if(id==='chat'||id.includes('chat'))setTimeout(()=>{const m=document.getElementById('chm');if(m)m.scrollTop=m.scrollHeight},50);
}

function renderPage(id){
  const map={
    dashboard:pageDash,

    attendance:pageAttendance,

    staff:pageStaff,
    groups:pageGroups,
    crm:pageCRM,
    examcenter:pageExamCenter,
    library:pageLibrary,
    roadmap:pageRoadmap,
    aiassist:pageAIAssist,
    settingspro:pageSettingsPro,
    certificate:pageCertificates,
    compiler:pageCompiler,
  };
  const pageFn = map[id] || (() => pageGeneric(id));
  return pageFn();
}

// QUIZ PLAY
let qzState={qi:0,score:0,answered:false,qId:1};
function pageQuizPlay(qId=1){
  const q=quizzes.find(x=>x.id===qId)||quizzes[0];
  if(!q)return '<div style="padding:40px;text-align:center;color:var(--mu)">Quiz topilmadi</div>';
  qzState={qi:0,score:0,answered:false,qId:q.id};
  return `<div class="qc"><div id="qz-wrap">${renderQuestion()}</div></div>`;
}

function renderQuestion(){
  const q=quizzes.find(x=>x.id===qzState.qId);
  if(!q)return '';
  if(qzState.qi>=q.questions.length)return renderQuizResult(q);
  const qst=q.questions[qzState.qi];
  const pct=Math.round((qzState.qi)/q.questions.length*100);
  return `
    <div class="qhd">
      <span class="qn">${qzState.qi+1} / ${q.questions.length}</span>
      <div class="qpb"><div class="qpf" style="width:${pct}%"></div></div>
      <span class="qs">⭐ ${qzState.score} ball</span>
    </div>
    <div class="qq">${qst.q}</div>
    ${qst.code?`<div class="qcode">${qst.code}</div>`:''}
    <div class="fbx" id="qfb"></div>
    <div class="opts">${qst.opts.map((o,i)=>`<div class="opt" id="opt${i}" onclick="checkAns(${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div>
    <div id="qnxt"></div>`;
}

function checkAns(idx){
  if(qzState.answered)return;
  qzState.answered=true;
  const q=quizzes.find(x=>x.id===qzState.qId);
  const qst=q.questions[qzState.qi];
  const fb=document.getElementById('qfb');
  document.getElementById('opt'+qst.ans).classList.add('ok');
  if(idx===qst.ans){qzState.score++;document.getElementById('opt'+idx).classList.add('ok');fb.className='fbx ok';fb.textContent='✅ To\'g\'ri! '+qst.exp;}
  else{document.getElementById('opt'+idx).classList.add('ng');fb.className='fbx ng';fb.textContent='❌ Noto\'g\'ri. To\'g\'ri: '+qst.opts[qst.ans]+'. '+qst.exp;}
  fb.style.display='block';
  const q2=quizzes.find(x=>x.id===qzState.qId);
  document.getElementById('qnxt').innerHTML=`<button class="addb" onclick="nextQ()" style="padding:12px 28px">${qzState.qi<q2.questions.length-1?'Keyingisi →':'🏆 Natija'}</button>`;
}

function nextQ(){
  qzState.qi++;qzState.answered=false;
  document.getElementById('qz-wrap').innerHTML=renderQuestion();
}

function renderQuizResult(q){
  const pct=Math.round(qzState.score/q.questions.length*100);
  const emoji=pct>=80?'🏆':pct>=60?'👍':'💪';
  // add coins for student
  if(cu.role==='student'&&pct>=60){const s=students.find(x=>x.name===cu.name);if(s){s.coins+=Math.round(pct/10);showToast(`🪙 +${Math.round(pct/10)} coin oldiniz!`)}}
  return `<div style="text-align:center;padding:40px 20px">
    <div style="font-size:64px;margin-bottom:16px">${emoji}</div>
    <h2 style="font-size:28px;margin-bottom:8px">${qzState.score}/${q.questions.length} to'g'ri</h2>
    <p style="color:var(--mu);margin-bottom:20px">Natija: <strong style="color:var(--or);font-size:20px">${pct}%</strong></p>
    <div class="pb" style="max-width:300px;margin:0 auto 24px;height:14px"><div class="pf" style="width:${pct}%;height:100%;background:${pct>=80?'var(--gr)':pct>=60?'var(--yl)':'var(--rd)'}"></div></div>
    ${pct>=60?`<div style="background:var(--orl);border-radius:10px;padding:14px;margin-bottom:20px;font-size:14px">🪙 +${Math.round(pct/10)} coin oldiniz!</div>`:''}
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="addb" onclick="document.getElementById('qz-wrap').innerHTML=pageQuizPlay(${q.id}).replace('<div class=\\'qc\\'>','').replace('</div>','');qzState={qi:0,score:0,answered:false,qId:${q.id}};document.getElementById('qz-wrap').innerHTML=renderQuestion()">🔄 Qayta</button>
      <button class="addb bl" onclick="showPage('dashboard','Bosh sahifa')">🏠 Bosh sahifa</button>
    </div>
  </div>`;
}

      ${chatMsgs.map(m=>`
        <div class="cm ${m.from===cu.name?'me':'other'}">
          <div class="cav" style="background:${roleColor(m.role)};color:#fff">${m.from[0]}</div>
          <div>
            <div style="font-size:11px;color:var(--mu);margin-bottom:3px">${m.from===cu.name?'Sen':m.from} · ${m.time}</div>
            <div class="cbbl">${m.text}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="cir">
      <input id="chi" placeholder="Xabar yozing..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="cs" onclick="sendChat()">↑</button>
    </div>
  </div>`;}

function sendChat(){
  const inp=document.getElementById('chi');const txt=inp.value.trim();
  if(!txt)return;
  chatMsgs.push({from:cu.name,text:txt,time:new Date().toTimeString().slice(0,5),role:cu.role});
  inp.value='';showPage('chat','Chat');
}

function saveCertificate(){

  const course=document.getElementById('certCourse').value;
  const grade=+document.getElementById('certGrade').value;
  if(!student||!course||!grade){showToast('❌ Barcha maydonlarni to\'ldiring');return}

}

function viewCertificate(id){
  const cert=certificates.find(c=>c.id===id);

  openModal(`🎓 ${cert.student}`,`

}

}

}
